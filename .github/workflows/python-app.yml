name: 宜昌市信用数据自动采集

on:
  schedule:
    - cron: '0 22 * * *'  # 每天UTC时间22:00运行（北京时间次日06:00）

permissions:
  contents: write

jobs:
  data-collect:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pycryptodome==3.19.1 requests==2.31.0 openpyxl==3.1.2

    - name: 执行数据采集
      id: export
      run: |
        # 生成北京时间时间戳并设置为输出变量
        ts=$(TZ='Asia/Shanghai' date +%Y%m%d%H%M)
        echo "ts=${ts}" >> $GITHUB_OUTPUT

        # 清理历史输出文件
        mkdir -p excel_output
        find excel_output/ -maxdepth 1 -type f \( -name "*.xlsx" -o -name "*.json" \) -delete

        # 执行主脚本
        python3 main.py

        # 查找所有生成的xlsx文件
        xlsx_files=$(ls excel_output/*.xlsx 2>/dev/null || true)
        if [ -z "$xlsx_files" ]; then
            echo "::error:: 未找到任何xlsx文件"
            exit 1
        fi

        # 为每个文件添加时间戳并记录新路径
        renamed_files=""
        for file in $xlsx_files; do
            basename=$(basename "$file")
            name_without_ext="${basename%.xlsx}"
            new_name="${name_without_ext}_${ts}.xlsx"
            new_path="excel_output/${new_name}"
            mv "$file" "$new_path"
            renamed_files="$renamed_files $new_path"
        done

        # 保存文件列表供后续步骤使用
        echo "renamed-files=${renamed_files}" >> $GITHUB_OUTPUT
        echo "$renamed_files" > renamed_files.txt

        # 验证至少有一个文件
        if [ ! -s renamed_files.txt ]; then
            echo "::error:: 文件生成失败"
            exit 1
        fi

    - name: 上传数据文件
      uses: actions/upload-artifact@v4
      with:
        name: enterprise-data
        path: excel_output/*.xlsx   # 上传所有xlsx文件
        retention-days: 7

    - name: 提交到仓库
      run: |
        # 配置 Git 身份
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

        # 使用北京时间生成时间戳与目录
        ts="${{ steps.export.outputs.ts }}"
        month_dir=$(TZ='Asia/Shanghai' date +'%Y-%m')

        mkdir -p "historical_data/$month_dir"

        # 复制所有重命名后的xlsx文件到历史目录
        if [ -f renamed_files.txt ]; then
            for file in $(cat renamed_files.txt); do
                if [ -f "$file" ]; then
                    cp "$file" "historical_data/$month_dir/"
                else
                    echo "警告: 文件 $file 不存在，跳过"
                fi
            done
        else
            echo "::error:: 未找到文件列表"
            exit 1
        fi

        # 添加变更（如果有）
        git add .
        
        # 检查是否有实际变更再提交
        if git diff --cached --quiet; then
          echo "✅ 没有变更，跳过提交"
        else
          git commit -m "📊 信用数据更新 [${ts}]"
          git push origin main
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
